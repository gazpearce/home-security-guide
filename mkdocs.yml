site_name: Home Security Guide
site_description: Expert UK home security guides covering CCTV systems, burglar alarms, smart locks, and property protection. Authoritative advice backed by ONS crime statistics, British Standards, and industry research.
site_author: Gary Pearce
site_url: https://home-security-guide.readthedocs.io/en/latest/
repo_url: https://github.com/gazpearce/home-security-guide
edit_uri: ""

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - yaml
    - json

nav:
  - Home: index.md
  - CCTV Systems: cctv.md
  - Alarm Systems: alarms.md
  - Smart Locks: smart-locks.md
  - Security Tips: tips.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gazpearce/home-security-guide

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
